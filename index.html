<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 300px;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    .mensaje {
      margin-top: 10px;
      text-align: center;
      color: green;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Votación</h2>

  <form onsubmit="enviarFormulario(event)">
    
    <label>Correo electrónico:</label>
    <input type="email" required>

    <label>Contraseña:</label>
    <input type="password" required>

    <label>Voto:</label>
    <select required>
      <option value="">Selecciona una opción</option>
      <option>PP</option>
      <option>VOX</option>
      <option>PSOE</option>
    </select>

    <button type="submit">Enviar</button>
  </form>

  <div class="mensaje" id="mensaje"></div>
</div>

<script>
function enviarFormulario(e) {
  e.preventDefault();
  document.getElementById("mensaje").innerText = "Voto enviado correctamente";
}
</script>

</body>
</html>
