<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 300px;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    .mensaje {
      margin-top: 10px;
      text-align: center;
      color: green;
    }

    .modal-exito {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-exito.show {
      display: flex;
    }

    .modal-contenido {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      width: 300px;
    }

    .modal-contenido h2 {
      color: #28a745;
      font-size: 32px;
      margin: 10px 0;
    }

    .modal-contenido p {
      font-size: 18px;
      color: #666;
      margin: 20px 0;
    }

    .modal-contenido button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    .modal-contenido button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Votación</h2>

  <form onsubmit="enviarFormulario(event)">
    
    <label>Correo electrónico:</label>
    <input type="email" required>

    <label>Contraseña:</label>
    <input type="password" required>

    <label>Voto:</label>
    <select required>
      <option value="">Selecciona una opción</option>
      <option>PP</option>
      <option>VOX</option>
      <option>PSOE</option>
    </select>

    <button type="submit">Enviar</button>
  </form>

  <div class="mensaje" id="mensaje"></div>
</div>

<div class="modal-exito" id="modalExito">
  <div class="modal-contenido">
    <h2>✓</h2>
    <h2>¡Éxito!</h2>
    <p>Cuestionario enviado con éxito</p>
    <button onclick="reiniciar()">Aceptar</button>
  </div>
</div>

<script>
function enviarFormulario(e) {
  e.preventDefault();
  
  // Mostrar modal de éxito
  document.getElementById("modalExito").classList.add("show");
}

function reiniciar() {
  // Limpiar formulario y cerrar modal
  document.querySelector("form").reset();
  document.getElementById("modalExito").classList.remove("show");
}
</script>

</body>
</html>
